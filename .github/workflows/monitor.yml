name: Flight Price Monitor

on:
  schedule:
    - cron: "0 1 * * *"  # 每天 UTC 01:00 = 台灣時間 09:00
  workflow_dispatch: {}   # 允許在 GitHub 網頁上手動點擊執行，方便測試

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price monitor
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python src/monitor.py

      - name: Commit updated price history
        run: |
          git config user.name "flight-bot"
          git config user.email "flight-bot@users.noreply.github.com"
          git add data/price_history.json
          git diff --staged --quiet || git commit -m "更新價格歷史紀錄 $(date -u +'%Y-%m-%d')"
          git push
