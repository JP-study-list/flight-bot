<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機票低價儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#101014;
    --panel:#17171d;
    --panel-2:#1d1d25;
    --line:#2a2a33;
    --cream:#EDEAE2;
    --dim:#8f8b80;
    --gold:#B08A3E;
    --gold-bright:#d4a94e;
    --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){html{scroll-behavior:auto}*{transition:none!important;animation:none!important}}
  body{
    background:var(--ink);color:var(--cream);
    font-family:'Noto Sans TC',sans-serif;font-size:15px;line-height:1.6;
    padding-bottom:80px;
  }
  a{color:var(--gold-bright)}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  /* ---- 頂部看板 ---- */
  header{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#14141a 0%,var(--ink) 100%);
    padding:34px 0 26px;
  }
  .board-label{
    font-family:var(--mono);font-size:12px;letter-spacing:.35em;
    color:var(--gold);text-transform:uppercase;margin-bottom:10px;
  }
  h1{font-weight:900;font-size:clamp(26px,4.5vw,38px);letter-spacing:.02em;line-height:1.25}
  h1 .gold{color:var(--gold)}
  .updated{
    margin-top:12px;font-family:var(--mono);font-size:13px;color:var(--dim);
    display:flex;align-items:center;gap:8px;
  }
  .updated .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex:none}

  /* ---- 篩選列 ---- */
  .filters{
    display:grid;grid-template-columns:repeat(4,1fr) auto;gap:12px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin:22px 0 30px;
  }
  .filters label{display:block;font-size:12px;color:var(--dim);margin-bottom:5px;letter-spacing:.05em}
  .filters select,.filters input{
    width:100%;background:var(--panel-2);border:1px solid var(--line);
    color:var(--cream);border-radius:9px;padding:9px 10px;font-size:14px;
    font-family:'Noto Sans TC',sans-serif;
  }
  .filters input[type=date]{font-family:var(--mono);font-size:13px}
  .filters select:focus,.filters input:focus,button:focus-visible{
    outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold);
  }
  .filters .reset{align-self:end}
  .reset button{
    background:none;border:1px solid var(--line);color:var(--dim);
    border-radius:9px;padding:9px 16px;font-size:13px;cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;white-space:nowrap;
  }
  .reset button:hover{border-color:var(--gold);color:var(--gold-bright)}

  /* ---- 區塊 ---- */
  section{margin-bottom:44px}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .sec-head svg{flex:none}
  h2{font-weight:900;font-size:19px;letter-spacing:.03em}
  .sec-note{font-size:12.5px;color:var(--dim);margin-left:auto;text-align:right}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;transition:border-color .15s;
  }
  .card.clickable{cursor:pointer}
  .card.clickable:hover,.card.selected{border-color:var(--gold)}
  .route{
    font-family:var(--mono);font-size:16px;font-weight:600;
    display:flex;align-items:center;gap:8px;
  }
  .route .arrow{color:var(--gold);font-weight:400}
  .route-zh{font-size:12px;color:var(--dim);margin-top:2px}
  .price{
    font-family:var(--mono);font-size:26px;font-weight:600;
    color:var(--gold-bright);margin-top:10px;font-variant-numeric:tabular-nums;
  }
  .price small{font-size:13px;color:var(--dim);font-weight:400;margin-left:4px}
  .meta{font-size:12.5px;color:var(--dim);margin-top:4px}
  .meta b{color:var(--cream);font-weight:500}

  /* 華航專區 */
  .ci-card{border-color:rgba(176,138,62,.55);background:linear-gradient(160deg,#1c1912 0%,var(--panel) 55%)}
  .badge{
    display:inline-block;font-size:11px;letter-spacing:.15em;
    border:1px solid var(--gold);color:var(--gold-bright);
    border-radius:99px;padding:1px 9px;margin-bottom:8px;font-family:var(--mono);
  }

  /* 組合卡 */
  .combo-card .leg{
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:var(--mono);font-size:13.5px;margin-top:8px;color:var(--cream);
  }
  .combo-card .leg .d{color:var(--dim)}
  .combo-total{
    border-top:1px dashed var(--line);margin-top:12px;padding-top:10px;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .combo-total .sum{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--gold-bright)}
  .combo-total .days{font-size:12px;color:var(--dim)}

  /* 趨勢圖 */
  .chart-panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .chart-panel .hint{font-size:12.5px;color:var(--dim);margin-bottom:12px}
  .chart-box{position:relative;height:320px}
  @media(max-width:640px){.chart-box{height:240px}}

  .empty{
    color:var(--dim);font-size:14px;background:var(--panel);
    border:1px dashed var(--line);border-radius:14px;padding:26px;text-align:center;
  }
  #loading{padding:60px 0;text-align:center;color:var(--dim);font-family:var(--mono)}

  @media(max-width:820px){.filters{grid-template-columns:1fr 1fr}}
  @media(max-width:640px){
    .filters{grid-template-columns:1fr 1fr}
    .grid{grid-template-columns:1fr 1fr}
  }
  @media(max-width:460px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="board-label">FARE WATCH — TW ⇄ JP</div>
    <h1>機票低價<span class="gold">儀表板</span></h1>
    <div class="updated"><span class="dot"></span><span id="updated-at">載入中</span></div>
  </div>
</header>

<div class="wrap">
  <div id="loading">正在讀取價格資料…</div>

  <div id="app" hidden>

    <div class="filters">
      <div>
        <label for="f-origin">出發地</label>
        <select id="f-origin"><option value="">全部</option></select>
      </div>
      <div>
        <label for="f-dest">目的地</label>
        <select id="f-dest"><option value="">全部</option></select>
      </div>
      <div>
        <label for="f-from">出發日（起）</label>
        <input type="date" id="f-from">
      </div>
      <div>
        <label for="f-to">出發日（迄）</label>
        <input type="date" id="f-to">
      </div>
      <div class="reset"><button id="f-reset" type="button">清除篩選</button></div>
    </div>

    <section id="sec-ci">
      <div class="sec-head">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B08A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.9 6.26L21 9.27l-4.8 4.28L17.4 20 12 16.7 6.6 20l1.2-6.45L3 9.27l6.1-1.01z"/></svg>
        <h2>華航專區</h2>
        <span class="sec-note">各航線華航最低價（依目前篩選）</span>
      </div>
      <div class="grid" id="ci-grid"></div>
    </section>

    <section id="sec-combo">
      <div class="sec-head">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B08A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        <h2>最便宜來回組合</h2>
        <span class="sec-note">去回間隔 30 天內</span>
      </div>
      <div class="grid" id="combo-grid"></div>
    </section>

    <section id="sec-routes">
      <div class="sec-head">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B08A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
        <h2>單程最低價總覽</h2>
        <span class="sec-note">點卡片看趨勢</span>
      </div>
      <div class="grid" id="route-grid"></div>
    </section>

    <section id="sec-trend">
      <div class="sec-head">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B08A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <h2>價格趨勢</h2>
        <span class="sec-note" id="trend-route-label"></span>
      </div>
      <div class="chart-panel">
        <div class="hint">每日掃描後記錄該航線「全航班最低價」與「華航最低價」的變化</div>
        <div class="chart-box"><canvas id="trend-chart"></canvas></div>
      </div>
    </section>

  </div>
</div>

<script>
const AIRPORT_ZH = {
  TPE:'桃園', RMQ:'台中', TSA:'松山',
  NRT:'東京成田', HND:'東京羽田', KIX:'大阪關西', FUK:'福岡', SDJ:'仙台'
};
const MAX_TRIP_DAYS = 30;
const fmt = n => Math.round(n).toLocaleString('en-US');
const zh = c => AIRPORT_ZH[c] || c;

let DATA = null;
let selectedTrendRoute = null;
let chart = null;

async function init(){
  try{
    const resp = await fetch('data/price_history.json', {cache:'no-store'});
    if(!resp.ok) throw new Error(resp.status);
    DATA = await resp.json();
  }catch(e){
    document.getElementById('loading').textContent =
      '讀不到價格資料。機器人可能還沒完成第一次掃描，明天再來看看。';
    return;
  }
  document.getElementById('loading').hidden = true;
  document.getElementById('app').hidden = false;

  const t = DATA.updated_at ? new Date(DATA.updated_at) : null;
  document.getElementById('updated-at').textContent = t
    ? '資料更新於 ' + t.toLocaleString('zh-TW', {hour12:false})
    : '尚無掃描資料';

  buildFilters();
  render();
}

function buildFilters(){
  const origins = [...new Set(DATA.latest.map(r=>r.o))].sort();
  const dests   = [...new Set(DATA.latest.map(r=>r.d))].sort();
  const oSel = document.getElementById('f-origin');
  const dSel = document.getElementById('f-dest');
  for(const c of origins) oSel.add(new Option(`${c} ${zh(c)}`, c));
  for(const c of dests)   dSel.add(new Option(`${c} ${zh(c)}`, c));

  for(const id of ['f-origin','f-dest','f-from','f-to'])
    document.getElementById(id).addEventListener('change', render);
  document.getElementById('f-reset').addEventListener('click', ()=>{
    for(const id of ['f-origin','f-dest','f-from','f-to'])
      document.getElementById(id).value = '';
    render();
  });
}

function getFiltered(){
  const o = document.getElementById('f-origin').value;
  const d = document.getElementById('f-dest').value;
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  return DATA.latest.filter(r =>
    (!o || r.o === o) && (!d || r.d === d) &&
    (!from || r.date >= from) && (!to || r.date <= to)
  );
}

function render(){
  const rows = getFiltered();
  renderCI(rows);
  renderCombos();
  renderRoutes(rows);
  renderTrend();
}

/* ---- 華航專區 ---- */
function renderCI(rows){
  const grid = document.getElementById('ci-grid');
  const byRoute = new Map();
  for(const r of rows){
    if(r.ci == null) continue;
    const k = r.o + '-' + r.d;
    if(!byRoute.has(k) || r.ci < byRoute.get(k).ci) byRoute.set(k, r);
  }
  const list = [...byRoute.values()].sort((a,b)=>a.ci-b.ci);
  grid.innerHTML = list.length ? list.map(r=>`
    <div class="card ci-card">
      <span class="badge">CHINA AIRLINES</span>
      <div class="route">${r.o}<span class="arrow">→</span>${r.d}</div>
      <div class="route-zh">${zh(r.o)} → ${zh(r.d)}</div>
      <div class="price">${fmt(r.ci)}<small>TWD 起</small></div>
      <div class="meta">最便宜日期 <b>${r.date}</b></div>
    </div>`).join('')
    : '<div class="empty" style="grid-column:1/-1">目前篩選範圍內沒有華航報價</div>';
}

/* ---- 來回組合（依篩選的日期範圍計算） ---- */
function renderCombos(){
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  const oF = document.getElementById('f-origin').value;
  const dF = document.getElementById('f-dest').value;

  const inRange = r => (!from || r.date >= from) && (!to || r.date <= to);
  const byDir = new Map();
  for(const r of DATA.latest){
    if(!inRange(r)) continue;
    const k = r.o + '-' + r.d;
    if(!byDir.has(k)) byDir.set(k, []);
    byDir.get(k).push(r);
  }

  const pairs = new Set();
  for(const r of DATA.latest){
    const tw = ['TPE','RMQ','TSA'].includes(r.o) ? r.o : r.d;
    const jp = tw === r.o ? r.d : r.o;
    if(oF && tw !== oF && jp !== oF) continue;
    if(dF && tw !== dF && jp !== dF) continue;
    pairs.add(tw + '|' + jp);
  }

  const combos = [];
  for(const p of pairs){
    const [tw, jp] = p.split('|');
    const out = byDir.get(tw + '-' + jp) || [];
    const back = byDir.get(jp + '-' + tw) || [];
    let best = null;
    for(const a of out){
      for(const b of back){
        const gap = (new Date(b.date) - new Date(a.date)) / 86400000;
        if(gap < 1 || gap > MAX_TRIP_DAYS) continue;
        const total = a.price + b.price;
        if(!best || total < best.total) best = {tw, jp, out:a, back:b, total, days:gap};
      }
    }
    if(best) combos.push(best);
  }
  combos.sort((a,b)=>a.total-b.total);

  const grid = document.getElementById('combo-grid');
  grid.innerHTML = combos.length ? combos.map(c=>`
    <div class="card combo-card">
      <div class="route">${c.tw}<span class="arrow">⇄</span>${c.jp}</div>
      <div class="route-zh">${zh(c.tw)} ⇄ ${zh(c.jp)}</div>
      <div class="leg"><span>去 ${c.out.date}</span><span>${fmt(c.out.price)}<span class="d"> ${c.out.airline}</span></span></div>
      <div class="leg"><span>回 ${c.back.date}</span><span>${fmt(c.back.price)}<span class="d"> ${c.back.airline}</span></span></div>
      <div class="combo-total">
        <span class="days">${c.days} 天行程</span>
        <span class="sum">${fmt(c.total)}</span>
      </div>
    </div>`).join('')
    : '<div class="empty" style="grid-column:1/-1">目前篩選範圍內組不出符合條件的來回行程</div>';
}

/* ---- 單程總覽 ---- */
function renderRoutes(rows){
  const byRoute = new Map();
  for(const r of rows){
    const k = r.o + '-' + r.d;
    if(!byRoute.has(k) || r.price < byRoute.get(k).price) byRoute.set(k, r);
  }
  const list = [...byRoute.values()].sort((a,b)=>a.price-b.price);
  const grid = document.getElementById('route-grid');
  grid.innerHTML = list.length ? list.map(r=>{
    const k = r.o + '-' + r.d;
    return `
    <div class="card clickable ${k===selectedTrendRoute?'selected':''}" data-route="${k}" tabindex="0" role="button" aria-label="查看 ${r.o} 到 ${r.d} 趨勢">
      <div class="route">${r.o}<span class="arrow">→</span>${r.d}</div>
      <div class="route-zh">${zh(r.o)} → ${zh(r.d)}</div>
      <div class="price">${fmt(r.price)}<small>TWD 起</small></div>
      <div class="meta"><b>${r.airline}</b> · ${r.date}</div>
    </div>`;
  }).join('')
  : '<div class="empty" style="grid-column:1/-1">目前篩選範圍內沒有航班資料</div>';

  grid.querySelectorAll('.clickable').forEach(el=>{
    const go = ()=>{ selectedTrendRoute = el.dataset.route; render();
      document.getElementById('sec-trend').scrollIntoView({behavior:'smooth'}); };
    el.addEventListener('click', go);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();go();} });
  });
}

/* ---- 趨勢圖 ---- */
function renderTrend(){
  const hist = DATA.history || {};
  const keys = Object.keys(hist);
  if(!selectedTrendRoute || !hist[selectedTrendRoute]){
    selectedTrendRoute = keys.find(k=>hist[k].length) || null;
  }
  const label = document.getElementById('trend-route-label');
  const ctx = document.getElementById('trend-chart');

  if(!selectedTrendRoute){
    label.textContent = '';
    if(chart){ chart.destroy(); chart = null; }
    return;
  }
  const series = hist[selectedTrendRoute];
  const [o,d] = selectedTrendRoute.split('-');
  label.textContent = `${o} → ${d}（${zh(o)} → ${zh(d)}）`;

  const labels = series.map(e=>e.c);
  const minData = series.map(e=>e.min);
  const ciData = series.map(e=>e.ci);

  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[
      { label:'全航班最低價', data:minData, borderColor:'#d4a94e',
        backgroundColor:'rgba(212,169,78,.12)', fill:true, tension:.3,
        pointRadius:3, pointBackgroundColor:'#d4a94e' },
      { label:'華航最低價', data:ciData, borderColor:'#8f8b80',
        borderDash:[6,4], fill:false, tension:.3,
        pointRadius:3, pointBackgroundColor:'#8f8b80', spanGaps:true }
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{labels:{color:'#EDEAE2', font:{family:"'Noto Sans TC'"}}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}：${c.parsed.y==null?'—':fmt(c.parsed.y)+' TWD'}`}}
      },
      scales:{
        x:{ticks:{color:'#8f8b80', font:{family:"'IBM Plex Mono'", size:11}}, grid:{color:'#22222a'}},
        y:{ticks:{color:'#8f8b80', font:{family:"'IBM Plex Mono'", size:11}, callback:v=>fmt(v)}, grid:{color:'#22222a'}}
      }
    }
  });
}

init();
</script>
</body>
</html>
